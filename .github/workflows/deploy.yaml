name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # mainブランチにプッシュされたら実行

# GitHub Pagesへのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Dev Containerと同じバージョンに合わせる
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # npm run buildで生成されるフォルダ名に合わせる（React/Viteなら通常 'dist'）
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
